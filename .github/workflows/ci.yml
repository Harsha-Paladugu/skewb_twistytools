# Enforces the repo's committed-build-output discipline: check:fresh fails if
# js/sheet.js, js/trainer.js or any HTML ?v= stamp is stale, then the engine /
# solver / space / trainer runners pin the machine-verified invariants.
# test:rules is excluded (needs the Firebase emulator; run locally, opt-in).
name: CI
on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:all
